services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3

  app1:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - APP_NAME=app1
      - MYSQL_URL=mysql+pymysql://root:root@mysql:3306/typeahead
      - REDIS_NODES=redis1:6379,redis2:6379,redis3:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis1:
        condition: service_started
      redis2:
        condition: service_started
      redis3:
        condition: service_started

  app2:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - APP_NAME=app2
      - MYSQL_URL=mysql+pymysql://root:root@mysql:3306/typeahead
      - REDIS_NODES=redis1:6379,redis2:6379,redis3:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis1:
        condition: service_started
      redis2:
        condition: service_started
      redis3:
        condition: service_started

  app3:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - APP_NAME=app3
      - MYSQL_URL=mysql+pymysql://root:root@mysql:3306/typeahead
      - REDIS_NODES=redis1:6379,redis2:6379,redis3:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis1:
        condition: service_started
      redis2:
        condition: service_started
      redis3:
        condition: service_started

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=typeahead
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis1:
    image: redis:alpine
    ports:
      - "6379:6379"

  redis2:
    image: redis:alpine
    ports:
      - "6380:6379"

  redis3:
    image: redis:alpine
    ports:
      - "6381:6379"

volumes:
  mysql_data:
